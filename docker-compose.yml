services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learning_integrations_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: bash -lc "bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0"
    env_file: .env.example
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    depends_on:
      - postgres
      - redis

  sidekiq:
    build: .
    command: bundle exec sidekiq
    env_file: .env.example
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    depends_on:
      - api
      - postgres
      - redis

  frontend:
    image: node:24
    working_dir: /app
    command: bash -lc "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - api

volumes:
  postgres_data:
  bundle_cache:

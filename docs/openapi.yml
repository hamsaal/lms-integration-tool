openapi: 3.1.0
info:
  title: Learning Integration Tool API
  version: 0.1.0
  description: Prototype API for Canvas-style launch, roster import, and grade passback concepts.
servers:
  - url: http://localhost:3000
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /api/courses:
    get:
      summary: List courses for the current organization.
      responses:
        "200":
          description: Course list.
    post:
      summary: Create a course.
      responses:
        "201":
          description: Course created.
  /api/courses/{id}/assignments:
    get:
      summary: List course assignments.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assignment list.
    post:
      summary: Create a course assignment.
      responses:
        "201":
          description: Assignment created.
  /api/assignments/{id}/submissions:
    post:
      summary: Submit learner activity work.
      responses:
        "201":
          description: Submission created.
  /api/submissions/{id}/grade:
    patch:
      summary: Grade a submission and create a pending passback record.
      responses:
        "200":
          description: Submission graded.
  /api/tool_launches:
    post:
      summary: Simulate an LTI-style id_token launch.
      security: []
      responses:
        "201":
          description: Launch accepted and local API token returned.
  /api/roster_imports/preview:
    post:
      summary: Validate a OneRoster-style roster import and return row counts without persisting records.
      responses:
        "200":
          description: Import preview counts.
        "422":
          description: Import validation failed.
  /api/roster_imports:
    post:
      summary: Validate and enqueue a OneRoster-style roster import.
      responses:
        "202":
          description: Import job queued.
  /api/grade_syncs:
    post:
      summary: Enqueue a grade passback sync job.
      responses:
        "202":
          description: Grade sync queued.
  /api/job_runs/{id}:
    get:
      summary: Read background job status.
      responses:
        "200":
          description: Job run.
  /api/analytics/course_summary:
    get:
      summary: Course summary counts for instructors and admins.
      responses:
        "200":
          description: Course summary.
  /api/audit_logs:
    get:
      summary: List sanitized audit logs for organization admins.
      parameters:
        - name: event
          in: query
          schema:
            type: string
        - name: target_type
          in: query
          schema:
            type: string
        - name: created_since
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Audit log list.
        "403":
          description: Admin role required.

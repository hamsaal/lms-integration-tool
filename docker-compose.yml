services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learning_integrations_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: bash -lc "bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0"
    env_file: .env.example
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/learning_integrations_development}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/learning_integrations_test}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-development-only-secret}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    depends_on:
      - postgres
      - redis

  sidekiq:
    build: .
    command: bundle exec sidekiq
    env_file: .env.example
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/learning_integrations_development}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/learning_integrations_test}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-development-only-secret}
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    depends_on:
      - api
      - postgres
      - redis

  frontend:
    image: node:24
    working_dir: /app
    command: bash -lc "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
      VITE_DEMO_JWT_SECRET: ${JWT_SECRET:-development-only-secret}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - api

  e2e:
    image: mcr.microsoft.com/playwright:v1.61.1-jammy
    working_dir: /app
    command: >
      bash -lc "for i in {1..30}; do curl -fsS http://api:3000/up >/dev/null && curl -fsS http://frontend:5173 >/dev/null && break || sleep 2; done &&
      curl -fsS http://api:3000/up >/dev/null &&
      curl -fsS http://frontend:5173 >/dev/null &&
      npm ci &&
      npm run test:e2e"
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend:5173
      PLAYWRIGHT_SKIP_WEB_SERVER: "1"
    volumes:
      - ./frontend:/app
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  bundle_cache:
